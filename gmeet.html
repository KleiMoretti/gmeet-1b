<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Redirecting to Class...</title>
</head>

<body>
    <h2 id="status">Checking your schedule...</h2>

    <script>
        const schedule = {
            "Monday": [
                { start: "08:00", end: "09:00", link: "https://meet.google.com/zrt-qhrr-vmw" },
                { start: "10:00", end: "11:00", link: "https://meet.google.com/nxq-byfg-mse" },
                { start: "11:00", end: "12:00", link: "https://meet.google.com/rot-mgqf-vij" },
                { start: "13:00", end: "16:00", link: "https://meet.google.com/dwy-gxvc-dir" }
            ],
            "Tuesday": [
                { start: "07:00", end: "08:00", link: "https://meet.google.com/nxq-byfg-mse" },
                { start: "08:00", end: "09:00", link: "https://meet.google.com/rot-mgqf-vij" },
                { start: "10:00", end: "13:00", link: "https://meet.google.com/tfr-ybyb-gey" },
                { start: "15:00", end: "17:00", link: "https://meet.google.com/mrf-dczh-xpp" }
            ],
            "Wednesday": [
                { start: "08:00", end: "09:00", link: "https://meet.google.com/hco-brsz-zni" },
                { start: "09:00", end: "10:00", link: "https://meet.google.com/rot-mgqf-vij" },
                { start: "10:00", end: "11:00", link: "https://meet.google.com/nxq-byfg-mse" },
                { start: "12:00", end: "13:00", link: "https://meet.google.com/qek-kamr-nsn" },
                { start: "13:00", end: "15:00", link: "https://meet.google.com/zrt-qhrr-vmw" },
                { start: "17:00", end: "19:00", link: "https://meet.google.com/bsc-zgoe-zkb?authuser=3" }
            ],
            "Friday": [
                { start: "07:00", end: "09:00", link: "https://meet.google.com/tfr-ybyb-gey" },
                { start: "10:00", end: "12:00", link: "https://meet.google.com/qek-kamr-nsn" },
                { start: "13:00", end: "15:00", link: "https://meet.google.com/hco-brsz-zni" }
            ],
            "Saturday": [
                { start: "17:00", end: "19:00", link: "https://meet.google.com/bsc-zgoe-zkb?authuser=3" }
            ]
        };

        function autoRedirect() {
            const now = new Date();
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const currentDay = days[now.getDay()];
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            const todaySchedule = schedule[currentDay];

            if (todaySchedule) {
                const currentClass = todaySchedule.find(c => {
                    const [hStart, mStart] = c.start.split(':').map(Number);
                    const [hEnd, mEnd] = c.end.split(':').map(Number);
                    return currentMinutes >= (hStart * 60 + mStart) && currentMinutes < (hEnd * 60 + mEnd);
                });

                if (currentClass) {
                    document.getElementById('status').innerText = "Class found! Redirecting...";
                    window.location.replace(currentClass.link);
                } else {
                    document.getElementById('status').innerText = "No ongoing class at this time.";
                }
            } else {
                document.getElementById('status').innerText = "No classes scheduled for today.";
            }
        }

        // Patakbuhin agad pagka-load
        autoRedirect();
    </script>
</body>

</html>
